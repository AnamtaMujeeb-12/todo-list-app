<!DOCTYPE html>
<html>
<head>
  <title>Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>My Tasks</h2>
    <p class="menu active" id="allTasks">All Tasks</p>
    <p class="menu" id="completedTasks">Completed</p>
  </div>

  <!-- Main Content -->
  <div class="main">

    <div class="header">
      <h2>To-Do List</h2>
    </div>

    <!-- Input -->
    <div class="task-input">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button onclick="addTodo()">Add</button>
    </div>

    <!-- List -->
    <ul id="taskList"></ul>

  </div>

</div>

<script>
let userId = localStorage.getItem('userId');
let currentFilter = "all";

let list = document.getElementById('taskList');
let taskInput = document.getElementById('taskInput');


async function load() {
  let res = await fetch('/todos/' + userId);
  let data = await res.json();

  list.innerHTML = '';

  data
    .filter(t => currentFilter === "all" || t.completed)
    .forEach(t => {
      list.innerHTML += `
        <li>
          <span class="${t.completed ? 'completed' : ''}">
            ${t.task}
          </span>

          <div class="task-actions">
            <button onclick="toggle(${t.id})">✔</button>
            <button class="delete-btn" onclick="del(${t.id})">✖</button>
          </div>
        </li>
      `;
    });
}

async function toggle(id){
  await fetch('/update/' + id);
  load();
}

async function addTodo() {
  await fetch('/add', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      userId,
      task: taskInput.value
    })
  });

  taskInput.value = ''; // clear input
  load();
}

async function del(id) {
  await fetch('/delete/' + id);
  load();
}
document.getElementById("allTasks").onclick = () => {
  currentFilter = "all";
  setActive("allTasks");
  load();
};

document.getElementById("completedTasks").onclick = () => {
  currentFilter = "completed";
  setActive("completedTasks");
  load();
};

function setActive(id) {
  document.querySelectorAll(".menu").forEach(m => m.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
load();
</script>
</body>
</html>
